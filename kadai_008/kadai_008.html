</head>

<body>
  <header>
    <h1>SAMURAIニュース</h1>
    <nav>
      <ul>
        <li><a href="https://www.sejuku.net/">ホーム</a></li>
        <li><a href="https://www.sejuku.net/">社会</a></li>
        <li><a href="https://www.sejuku.net/">経済</a></li>
        <li><a href="https://www.sejuku.net/">スポーツ</a></li>
        <li><a href="https://www.sejuku.net/">テクノロジー</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <article>
      <h2>社会</h2>
      <section>
        <h3>和菓子店も「トリックオアトリート！」</h3>
        <p>日本でも年々人気の高まるハロウィン。<br>今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発しました。</p>
        <audio src="ichi.mp3" controls></audio>
      </section>
      <section>
        <h3>私のおすすめ和菓子アンケートフォーム</h3>
        <form>
            <label for="name">氏名</label>
            <input type="text" id="name" placeholder="名前を入力してください" required>
            <br>
            <label for="age">年代</label>
            <select id="age">
              <option value="10代">10代以下</option>
              <option value="20代">20代</option>
              <option value="30代">30代</option>
              <option value="40代以上">40代以上</option>
            </select>
            <div>
              <label for="male">男性</label><input type="radio" id="male" name="gender" value="男性">
              <label for="female">女性</label><input type="radio" id="female" name="gender" value="女性">
              <label for="other">その他</label><input type="radio" id="other" name="gender" value="その他">
            </div>
            <div>
              <label for="favorite">おすすめ和菓子の名称</label>
              <input type="text" id="favorite" placeholder="みたらし団子">
            </div>
            <div>
              <label for="reason">おすすめする理由</label>
              <textarea id="reason" placeholder=""></textarea>
            </div>
            <div>
              <label for="agreement">個人情報保護方針に同意する</label>
              <input type="checkbox" id="agreement" required>
            </div>
            <input type="submit" value="送信">
            <input type="reset" value="リセット">
        </form>
      </section>
    </article>
    <article> 
      <h2>テクノロジー</h2>
      <section>
        <h3>SAMURAIが新しい動画をリリース</h3>
        <p>SAMURAI公式YouTubeで新しい動画がリリースされました。<br>動画の内容はHTML/CSSの解説です。</p>
      </section>
    </article>
  </main>

    <p>&copy;SAMURAIニュース</p>
  </footer>
